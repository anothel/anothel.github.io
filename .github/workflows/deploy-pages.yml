name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Update data"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Validate artifact
        run: npm run check:dist

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployed site
        env:
          SITE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          base="${SITE_URL%/}"
          for route in "" today/ explore/ review/ status/ trends/ packages/ repos/ links/ notes/ topics/agent-skills/ topics/ai-agents/ topics/ai-engineering/ topics/ai-evals/ topics/mcp/ topics/security/ topics/workflow-automation/ robots.txt sitemap.xml; do
            curl --fail --silent --show-error --location "${base}/${route}" > /dev/null
          done

          asset="$(curl --fail --silent --show-error --location "${base}/explore/" | grep -oE '/_astro/[^" ]+\.js' | head -n 1)"
          test -n "${asset}"
          curl --fail --silent --show-error --location "${base}${asset}" > /dev/null

          status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "${base}/__deployment_probe_missing__")"
          test "${status}" = "404"
