name: Update data

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Optional note for the refresh report"
        required: false
        default: "manual refresh"
  schedule:
    - cron: "17 21 * * *"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch data
        run: node scripts/update-all.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify generated data
        run: node scripts/validate-data.mjs

      - name: Summarize refresh
        if: always()
        run: |
          node scripts/report-refresh.mjs --out-dir "${RUNNER_TEMP}/refresh-report" --stdout >> "${GITHUB_STEP_SUMMARY}"
        env:
          REFRESH_REASON: ${{ github.event_name == 'workflow_dispatch' && inputs.reason || github.event_name }}

      - name: Upload refresh report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-report
          path: ${{ runner.temp }}/refresh-report

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/trends.json data/packages.json data/repos.json data/links.json data/today.json data/manifest.json data/refresh-report.json index.html today/index.html status/index.html trends/index.html packages/index.html repos/index.html links/index.html notes/index.html topics/ai-agents/index.html topics/mcp/index.html topics/agent-skills/index.html topics/ai-evals/index.html topics/workflow-automation/index.html topics/security/index.html; then
            echo "No data changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trends.json data/packages.json data/repos.json data/links.json data/today.json data/manifest.json data/refresh-report.json index.html today/index.html status/index.html trends/index.html packages/index.html repos/index.html links/index.html notes/index.html topics/ai-agents/index.html topics/mcp/index.html topics/agent-skills/index.html topics/ai-evals/index.html topics/workflow-automation/index.html topics/security/index.html
          git commit -m "chore: update dashboard data"
          git push
