<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Curated reference queue for docs, articles, APIs, and tools.">
    <meta name="author" content="anothel">
    <link rel="canonical" href="https://anothel.github.io/links/">
    <meta property="og:site_name" content="anothel">
    <meta property="og:title" content="Links Queue - anothel">
    <meta property="og:description" content="Curated reference queue for docs, articles, APIs, and tools.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://anothel.github.io/links/">
    <title>Links Queue - anothel</title>
    <link rel="stylesheet" href="../css/site.css">
    <script defer src="../js/link-queue.js"></script>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <a class="brand" href="../index.html" aria-label="anothel home">anothel</a>
            <div>
                <p class="eyebrow">Live module</p>
                <h1>Links queue.</h1>
            </div>
            <p class="stamp">Updated <span data-updated>loading</span></p>
        </header>

        <aside class="sidebar" aria-label="Link filters">
            <div class="panel">
                <h2>Filters</h2>
                <label>
                    Category
                    <select data-category>
                        <option>Loading</option>
                    </select>
                </label>
                <label>
                    Search
                    <input data-query type="search" placeholder="github, docs, runtime">
                </label>
            </div>
        </aside>

        <main>
            <section class="stats-grid" aria-label="Links queue stats">
                <article class="stat-card">
                    <span>Total</span>
                    <strong data-total>-</strong>
                </article>
                <article class="stat-card">
                    <span>Top category</span>
                    <strong data-top-category>-</strong>
                </article>
                <article class="stat-card">
                    <span>Source</span>
                    <strong data-source-status>-</strong>
                </article>
            </section>

            <section class="link-grid" aria-label="Curated links" data-link-list></section>
        </main>
    </div>
</body>
</html>
