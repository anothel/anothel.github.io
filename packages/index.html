<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="npm package watchlist for release and download signals.">
    <meta name="author" content="anothel">
    <link rel="canonical" href="https://anothel.github.io/packages/">
    <meta property="og:site_name" content="anothel">
    <meta property="og:title" content="Package Watchlist - anothel">
    <meta property="og:description" content="npm package watchlist for release and download signals.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://anothel.github.io/packages/">
    <title>Package Watchlist - anothel</title>
    <link rel="stylesheet" href="../css/site.css">
    <script defer src="../js/package-watchlist.js"></script>
</head>
<body>
    <div class="shell hub-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">Live module</p>
                <h1>Package watchlist.</h1>
            </div>
            <p class="stamp">Updated <span data-updated>2026-06-14</span></p>
            <nav class="site-nav" aria-label="Primary">
                <a href="../index.html">Home</a>
                <a href="../today/index.html">Today</a>
                <a href="../trends/index.html">Trends</a>
                <a href="../packages/index.html" aria-current="page">Packages</a>
                <a href="../repos/index.html">Repos</a>
                <a href="../links/index.html">Links</a>
            </nav>
        </header>

        <main class="hub-main">
            <section class="stats-grid" aria-label="Package watchlist stats">
                <article class="stat-card">
                    <span>Total</span>
                    <strong data-total>-</strong>
                </article>
                <article class="stat-card">
                    <span>Top package</span>
                    <strong data-top-package>-</strong>
                </article>
                <article class="stat-card">
                    <span>Data status</span>
                    <strong data-source-status>ok</strong>
                </article>
            </section>

            <section class="rank-panel" aria-labelledby="package-title">
                <div class="panel-heading">
                    <h2 id="package-title">npm watchlist</h2>
                    <p>Focused packages, weekly downloads, and why they are tracked.</p>
                </div>
                <div class="watch-head" aria-hidden="true">
                    <span>#</span>
                    <span>Package</span>
                    <span>Category</span>
                    <span>Downloads</span>
                    <span>Focus</span>
                </div>
                <div class="watch-list" data-package-list></div>
            </section>
        </main>
    </div>
</body>
</html>
