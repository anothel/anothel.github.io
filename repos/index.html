<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="GitHub repository watchlist for selected projects and activity signals.">
    <meta name="author" content="anothel">
    <link rel="canonical" href="https://anothel.github.io/repos/">
    <meta property="og:site_name" content="anothel">
    <meta property="og:title" content="Repo Watchlist - anothel">
    <meta property="og:description" content="GitHub repository watchlist for selected projects and activity signals.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://anothel.github.io/repos/">
    <title>Repo Watchlist - anothel</title>
    <link rel="stylesheet" href="../css/site.css">
    <script defer src="../js/repo-watchlist.js"></script>
</head>
<body>
    <div class="shell hub-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">Live module</p>
                <h1>Repo watchlist.</h1>
            </div>
            <p class="stamp">Updated <span data-updated>loading</span></p>
            <nav class="site-nav" aria-label="Primary">
                <a href="../index.html">Home</a>
                <a href="../today/index.html">Today</a>
                <a href="../trends/index.html">Trends</a>
                <a href="../packages/index.html">Packages</a>
                <a href="../repos/index.html" aria-current="page">Repos</a>
                <a href="../links/index.html">Links</a>
            </nav>
        </header>

        <main class="hub-main">
            <section class="stats-grid" aria-label="Repo watchlist stats">
                <article class="stat-card">
                    <span>Total</span>
                    <strong data-total>-</strong>
                </article>
                <article class="stat-card">
                    <span>Top repo</span>
                    <strong data-top-repo>-</strong>
                </article>
                <article class="stat-card">
                    <span>Source</span>
                    <strong data-source-status>-</strong>
                </article>
            </section>

            <section class="rank-panel" aria-labelledby="repo-title">
                <div class="panel-heading">
                    <h2 id="repo-title">GitHub watchlist</h2>
                    <p>Selected repositories, stars, and why they are tracked.</p>
                </div>
                <div class="watch-head" aria-hidden="true">
                    <span>#</span>
                    <span>Repository</span>
                    <span>Category</span>
                    <span>Stars</span>
                    <span>Focus</span>
                </div>
                <div class="watch-list" data-repo-list></div>
            </section>
        </main>
    </div>
</body>
</html>
