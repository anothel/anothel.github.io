<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="GitHub projects with useful traction, activity, and focus areas.">
    <meta name="author" content="anothel">
    <link rel="canonical" href="https://anothel.github.io/repos/">
    <meta property="og:site_name" content="anothel">
    <meta property="og:title" content="Repos - anothel">
    <meta property="og:description" content="GitHub projects with useful traction, activity, and focus areas.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://anothel.github.io/repos/">
    <title>Repos - anothel</title>
    <link rel="stylesheet" href="../css/site.css">
    <script defer src="../js/repo-watchlist.js"></script>
</head>
<body>
    <div class="shell hub-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">GitHub traction</p>
                <h1>GitHub projects with useful traction.</h1>
            </div>
            <p class="stamp">Updated <span data-updated>2026-06-14</span></p>
            <nav class="site-nav" aria-label="Primary">
                <a href="../index.html">Home</a>
                <a href="../today/index.html">Today</a>
                <a href="../trends/index.html">Trends</a>
                <a href="../packages/index.html">Packages</a>
                <a href="../repos/index.html" aria-current="page">Repos</a>
                <a href="../links/index.html">Links</a>
            </nav>
        </header>

        <main class="hub-main">
            <section class="stats-grid" aria-label="Repo traction stats">
                <article class="stat-card">
                    <span>Repositories</span>
                    <strong data-total>-</strong>
                </article>
                <article class="stat-card">
                    <span>Top project</span>
                    <strong data-top-repo>-</strong>
                </article>
                <article class="stat-card">
                    <span>Data status</span>
                    <strong data-source-status>ok</strong>
                </article>
            </section>

            <section class="rank-panel" aria-labelledby="repo-title">
                <div class="panel-heading">
                    <h2 id="repo-title">Project traction</h2>
                    <p>Stars, recent activity, and why each project is on the list.</p>
                </div>
                <div class="watch-head" aria-hidden="true">
                    <span>#</span>
                    <span>Repository</span>
                    <span>Category</span>
                    <span>Stars</span>
                    <span>Focus</span>
                </div>
                <div class="watch-list" data-repo-list></div>
            </section>
        </main>
    </div>
</body>
</html>
